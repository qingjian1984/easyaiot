# pnpm 11+：构建脚本需显式放行（见 https://pnpm.io/settings#allowbuilds）
nodeLinker: hoisted
shamefullyHoist: true
# Docker/BuildKit 内 symlink 链入 store 易在 install 结束后长时间无输出挂起，copy 更稳
package-import-method: copy
# 只拉当前平台 optional 依赖，避免 esbuild 去拉 s390x/darwin 等无关包导致超时
supportedArchitectures:
  os:
    - current
  cpu:
    - current
  libc:
    - current
allowBuilds:
  esbuild: true
  vue-demi: true
  vue-echarts: true
