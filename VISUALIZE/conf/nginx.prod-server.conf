# 生产环境：VISUALIZE dist 部署到服务器自建 nginx（非 Docker）
# 监听 8002，静态根目录 html/visualize（与 WEB 的 html/dist 同级）
# API：/admin-api/ → Gateway 172.16.0.134:48080
#
# 目录约定（相对 nginx 安装前缀，常见 /usr/local/nginx）：
#   html/dist        ← WEB 打包产物
#   html/visualize   ← VISUALIZE 打包产物（本配置 root）
#
# 使用方式二选一：
#   1) 与 WEB/conf/nginx.prod-server.conf 合并为同一份 nginx.conf（推荐，已含本 server）
#   2) 仅部署可视化时：备份原 nginx.conf 后替换，nginx -t && nginx -s reload
#
# 浏览器访问：http://<nginx主机>:8002
# WEB 生产 env VITE_GLOB_VISUALIZE_URL=/visualize 会解析为 当前主机:8002

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # VISUALIZE 大屏编辑器（与 WEB :8888 同机不同端口，站点根部署）
    server {
        listen       8002;
        server_name  localhost;

        client_max_body_size 100M;
        client_header_timeout 20m;
        client_body_timeout 20m;
        proxy_connect_timeout 1500s;
        proxy_read_timeout 20m;
        proxy_send_timeout 20m;

        underscores_in_headers on;

        location / {
            root   html/visualize;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        # 带 hash 静态资源：缺失时直接 404，避免回退成 text/html
        location ^~ /assets/ {
            root   html/visualize;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ^~ /static/ {
            root   html/visualize;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # 编辑器直连 :8002 时走 Gateway（与 Docker VISUALIZE/conf/nginx.conf 一致）
        location /admin-api/ {
            allow all;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
