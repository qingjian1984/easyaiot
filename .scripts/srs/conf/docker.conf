# SRS Docker 配置文件
# 用于 Docker 容器部署的 SRS 配置
#
# 录像与日志目录（容器内路径，勿改为宿主机路径）：
# - 以下 srs_log_file、dvr_path 均使用容器内 /data/...（与 compose 中 volume 目标路径一致）
# - 宿主机约定为根目录 /data（见 .scripts/docker/docker-compose.yml：/data:/data），例如 /data/playbacks/...

listen              1935;
max_connections     1000;
daemon              on;
srs_log_tank        file;
srs_log_file        /data/srs.log;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    raw_api {
        enabled             on;
        allow_reload        on;
    }
}
stats {
    network         0;
}
rtc_server {
    enabled on;
    listen 8000;
    candidate *;
}

vhost __defaultVhost__ {
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }
    dvr {
        enabled             on;
        dvr_path            /data/playbacks/[app]/[stream]/[2006]/[01]/[02]/[timestamp].flv;
        dvr_plan            segment;
        dvr_duration        30;
        dvr_wait_keyframe   on;
    }
    http_hooks {
        enabled             on;
        on_dvr              http://localhost:48080/admin-api/video/camera/callback/on_dvr;
        on_publish          http://localhost:48080/admin-api/video/camera/callback/on_publish;
    }
    # 注意：回调地址由 install_middleware_linux.sh prepare_srs_config 按部署形态写入：
    # - full/standard：经 Gateway 48080 -> /admin-api/video/camera/callback/*
    # - mini（无 Gateway）：直连宿主机 VIDEO 6000 -> /video/camera/callback/*
}

