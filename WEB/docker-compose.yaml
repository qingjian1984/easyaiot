# 构建期依赖缓存（运行时无需挂载）：
#   项目根 .build-cache/web/pnpm-store — docker build 时 local cache（见 Dockerfile、install_linux.sh）
#   默认属主 UID/GID=1000
services:
  web-service:
    image: web-service:latest
    container_name: web-service
    user: root

    # 端口映射
    ports:
      - "${WEB_PORT:-8888}:80"

    # 数据卷挂载
    volumes:
      # Nginx配置文件（mini 形态由 install_linux.sh 写入 NGINX_CONF=./conf/nginx.mini.conf）
      - ${NGINX_CONF:-./conf/nginx.conf}:/etc/nginx/nginx.conf:ro
      # WEB前端构建/运行日志目录（非nginx access/error日志）
      - ./logs:/app/logs
      # SSL证书（如果存在）
      - ./conf/ssl:/etc/nginx/ssl:ro
      # 时区文件挂载
      - /etc/localtime:/etc/localtime:ro

    # 环境变量
    environment:
      # 时区配置
      - TZ=Asia/Shanghai

    # 添加hosts映射，使容器能够通过宿主机端口访问各业务服务
    # mini 形态：admin-api 直连 system-host:48099（无 iot-gateway）
    # standard/full：经 gateway:48080 转发
    extra_hosts:
      - "gateway:host-gateway"
      - "system-host:host-gateway"
      - "video-host:host-gateway"  # 用于访问使用host网络模式的video-service（端口6000）
      - "ai-host:host-gateway"  # 用于访问使用host网络模式的ai-service（端口5000）
      - "srs-host:host-gateway"  # 用于访问使用host网络模式的SRS服务（端口1985）
      - "zlm-host:host-gateway"  # 用于访问ZLMediaKit(WVP/GB28181)的ws-flv/http-flv播流端口（宿主机6080）
      # 云端服务器备用方案：如果host-gateway不工作，取消下面的注释并替换为实际IP（注意！！这里的-绝对不能多出来多余的空格，否则配置失效导致nginx无法访问对应的服务！！）
      # 示例（请根据实际情况修改）：
     # - "gateway:192.168.11.28"        # Docker默认网关IP
     # - "video-host:192.168.11.28"     # 宿主机IP（用于访问video-service:6000）
     # - "ai-host:192.168.11.28"        # 宿主机IP（用于访问ai-service:5000）
     # - "srs-host:192.168.11.28"       # 宿主机IP（用于访问SRS服务:1985）
      # 或者使用宿主机实际IP（推荐）：
      # - "gateway:YOUR_HOST_IP"      # 替换YOUR_HOST_IP为实际宿主机IP
      # - "video-host:YOUR_HOST_IP"   # 替换YOUR_HOST_IP为实际宿主机IP
      # - "ai-host:YOUR_HOST_IP"      # 替换YOUR_HOST_IP为实际宿主机IP
      # - "srs-host:YOUR_HOST_IP"     # 替换YOUR_HOST_IP为实际宿主机IP

    # 重启策略
    restart: unless-stopped

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 网络配置（连接到统一网络，以便访问AI和VIDEO服务）
    networks:
      - easyaiot-network

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  easyaiot-network:
    name: easyaiot-network
    external: true

