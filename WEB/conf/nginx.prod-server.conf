# 生产环境：jar + dist 部署到服务器自建 nginx（非 Docker）
# 监听：
#   8888  → WEB 管理端     html/dist
#   8002  → VISUALIZE 编辑器 html/visualize（与 dist 同级）
#   1881  → 本机反代 FUXA  → 容器所在主机 10.0.0.87:1881
# 后端网关 172.16.0.134:48080
# 支持 WebSocket：集群概览 /dev-api/node/ws/cluster-metrics（及 /admin-api/ 同源）
#
# 目录约定（相对 nginx 安装前缀，常见 /usr/local/nginx）：
#   html/dist        ← WEB 打包产物（pnpm build）
#   html/visualize   ← VISUALIZE 打包产物（pnpm build），勿放到 dist 子目录
#
# 前端生产 env（WEB/.env.production）：
#   VITE_GLOB_VISUALIZE_URL=/visualize  → 当前主机:8002
#   VITE_GLOB_FUXA_URL=/fuxa            → 当前主机:1881（本机反代，非直连容器）
# iot-visualize：
#   IOT_FUXA_BASE_URL=http://10.0.0.87:1881           # 后端代登录：直连 FUXA 容器
#   IOT_FUXA_PUBLIC_URL=http://<用户访问WEB的主机>:1881  # SSO 跳转：走本机 nginx 反代
#
# 使用：备份原 nginx.conf 后替换，或 include 本文件中的 http/server 块；
#       nginx -t && nginx -s reload

#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png application/json image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # WebSocket 升级映射（集群概览 / FUXA 均需）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 通用代理头设置，避免重复定义
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---------- WEB 管理端 ----------
    server {
        listen       8888;
        server_name  localhost;

        client_max_body_size 550M;
        client_header_timeout 20m;
        client_body_timeout 20m;
        proxy_connect_timeout 1500s;
        # WS 长连接：读超时过短会导致连接被 nginx 主动断开后前端重连
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        underscores_in_headers on;

        #access_log  logs/host.access.log  main;

        location / {
            root   html/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        location /api/v1/buckets/ {
            allow all;
            proxy_pass http://10.0.0.87:9001/api/v1/buckets/;
        }

        # Admin API（含 WS：/admin-api/node/ws/cluster-metrics）
        location /admin-api/ {
            allow all;

            # WebSocket 升级
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;

            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        location /dev-api/nodeRed/ {
            allow all;
            proxy_pass http://10.0.0.87:1880/;
        }

        location /dev-api/ai/ {
            allow all;
            proxy_pass http://172.16.0.134:5000/;
        }

        # 生产构建 VITE_GLOB_API_URL=/dev-api
        # 集群概览 WS：/dev-api/node/ws/cluster-metrics → /admin-api/node/ws/cluster-metrics
        location /dev-api/ {
            allow all;

            # WebSocket 升级（与 /admin-api/ 一致）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;

            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        # VISUALIZE / FUXA 哨兵：便于运维探测；实际打开 :8002 / 本机反代 :1881
        location = /visualize {
            return 302 $scheme://$host:8002/;
        }
        location = /visualize/ {
            return 302 $scheme://$host:8002/;
        }
        location = /fuxa {
            return 302 $scheme://$host:1881/editor;
        }
        location = /fuxa/ {
            return 302 $scheme://$host:1881/;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    # ---------- VISUALIZE 大屏编辑器（站点根，勿做 /visualize 子路径反代）----------
    # 与 VISUALIZE/conf/nginx.prod-server.conf 保持一致
    server {
        listen       8002;
        server_name  localhost;

        client_max_body_size 100M;
        client_header_timeout 20m;
        client_body_timeout 20m;
        proxy_connect_timeout 1500s;
        proxy_read_timeout 20m;
        proxy_send_timeout 20m;

        underscores_in_headers on;

        location / {
            root   html/visualize;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        location ^~ /assets/ {
            root   html/visualize;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ^~ /static/ {
            root   html/visualize;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /admin-api/ {
            allow all;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    # ---------- FUXA 本机反代（容器在 10.0.0.87:1881）----------
    # Angular 使用站点根绝对路径，必须独立端口反代，不可挂 /fuxa 子路径
    # 须已挂载 easyaiot-sso.html 到 FUXA client/dist
    server {
        listen       1881;
        server_name  localhost;

        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;

            proxy_pass http://10.0.0.87:1881;
        }
    }

    server {
        listen       9988;
        server_name  localhost;
        client_max_body_size 500M;

        location / {
            root   html/website/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        listen       8099;
        server_name  localhost;

        charset utf-8,gbk;
        root /usr/local/nginx/html/files;
        autoindex on;

        autoindex_localtime on;
        location ~ \.mp4$ {
            mp4;
            mp4_buffer_size 1m;
            mp4_max_buffer_size 5m;
        }
    }
}
