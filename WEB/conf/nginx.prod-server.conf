# 生产环境：jar + dist 部署到服务器自建 nginx（非 Docker）
# 监听 8888，静态根目录 html/dist，后端网关 172.16.0.134:48080
# 关键 WebSocket：集群概览 /dev-api/node/ws/cluster-metrics（及 /admin-api/ 同源）
#
# 使用：备份原 nginx.conf 后替换，或 include 本文件中的 http/server 块；
#       nginx -t && nginx -s reload

#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # WebSocket 升级映射（集群概览 /dev-api/node/ws/cluster-metrics 必需）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 通用代理头设置，避免重复定义
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen       8888;
        server_name  localhost;

        client_max_body_size 550M;
        client_header_timeout 20m;
        client_body_timeout 20m;
        proxy_connect_timeout 1500s;
        # WS 长连接：读超时过短会导致连接被 nginx 主动断开后前端重连
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        underscores_in_headers on;

        #access_log  logs/host.access.log  main;

        location / {
            root   html/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        location /api/v1/buckets/ {
            allow all;
            proxy_pass http://10.0.0.87:9001/api/v1/buckets/;
        }

        # Admin API（含 WS：/admin-api/node/ws/cluster-metrics）
        location /admin-api/ {
            allow all;

            # WebSocket 升级
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;

            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        location /dev-api/nodeRed/ {
            allow all;
            proxy_pass http://10.0.0.87:1880/;
        }

        location /dev-api/ai/ {
            allow all;
            proxy_pass http://172.16.0.134:5000/;
        }

        # 生产构建 VITE_GLOB_API_URL=/dev-api
        # 集群概览 WS：/dev-api/node/ws/cluster-metrics → /admin-api/node/ws/cluster-metrics
        location /dev-api/ {
            allow all;

            # WebSocket 升级（与 /admin-api/ 一致）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;

            proxy_pass http://172.16.0.134:48080/admin-api/;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen       9988;
        server_name  localhost;
        client_max_body_size 500M;

        location / {
            root   html/website/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        listen       8099;
        server_name  localhost;

        charset utf-8,gbk;
        root /usr/local/nginx/html/files;
        autoindex on;

        autoindex_localtime on;
        location ~ \.mp4$ {
            mp4;
            mp4_buffer_size 1m;
            mp4_max_buffer_size 5m;
        }
    }
}
