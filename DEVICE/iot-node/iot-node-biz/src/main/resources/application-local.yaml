spring:
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        validationQuery: SELECT 1
        testWhileIdle: true
      primary: master
      datasource:
        master:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/iot-node20?autoReconnect=true&useUnicode=true&characterEncoding=utf8&stringtype=unspecified
          username: postgres
          password: iot45722414822
  redis:
    host: localhost
    port: 6379
    database: 0
    password: basiclab@iot975248395

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics

logging:
  level:
    com.basiclab.iot.node.dal.pgsql: DEBUG
